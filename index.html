<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f5a623">
<title>Fraimage Inventory Scanner</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-title" content="Fraimage">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%230d0f0f'/><rect x='6' y='6' width='22' height='22' rx='3' fill='none' stroke='%23f5a623' stroke-width='3'/><rect x='11' y='11' width='12' height='12' rx='1.5' fill='%23f5a623'/><rect x='36' y='6' width='22' height='22' rx='3' fill='none' stroke='%23f5a623' stroke-width='3'/><rect x='41' y='11' width='12' height='12' rx='1.5' fill='%23f5a623'/><rect x='6' y='36' width='22' height='22' rx='3' fill='none' stroke='%23f5a623' stroke-width='3'/><rect x='11' y='41' width='12' height='12' rx='1.5' fill='%23f5a623'/><rect x='36' y='36' width='10' height='10' rx='1.5' fill='%23f5a623'/><rect x='50' y='36' width='10' height='10' rx='1.5' fill='%23f5a623'/><rect x='36' y='50' width='10' height='10' rx='1.5' fill='%23f5a623'/><rect x='50' y='50' width='10' height='10' rx='1.5' fill='%23f5a623'/></svg>">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<!-- jsQR loaded from multiple CDNs with fallback -->
<script>
(function(){
  var cdns = [
    'https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js',
    'https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js',
    'https://unpkg.com/jsqr@1.4.0/dist/jsQR.js'
  ];
  var idx = 0;
  function tryNext() {
    if (idx >= cdns.length) {
      console.warn('[jsQR] All CDNs failed — BarcodeDetector only mode');
      return;
    }
    var s = document.createElement('script');
    s.src = cdns[idx++];
    s.onload = function(){ console.log('[jsQR] Loaded from', s.src); };
    s.onerror = function(){ console.warn('[jsQR] Failed:', s.src, '— trying next'); tryNext(); };
    document.head.appendChild(s);
  }
  tryNext();
})();
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@400;600;700;900&display=swap');
:root{--bg:#0d0f0f;--surface:#161a1a;--panel:#1e2424;--border:#2e3838;--amber:#f5a623;--amber-dim:#a86f0f;--green:#22c55e;--red:#ef4444;--blue:#38bdf8;--purple:#a78bfa;--text:#e8eaea;--muted:#6b7a7a;--mono:'Share Tech Mono',monospace;--sans:'Barlow',sans-serif;--r:10px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:16px;line-height:1.4;min-height:100vh;overscroll-behavior:none}
.screen{display:none;flex-direction:column;min-height:100vh}.screen.active{display:flex}

/* SPLASH */
#splash{position:fixed;inset:0;z-index:9999;background:radial-gradient(ellipse at 40% 35%,#1e2a1e,#0d0f0f 65%);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .5s,visibility .5s}
#splash.hide{opacity:0;visibility:hidden;pointer-events:none}
.splash-icon{width:96px;height:96px;border-radius:22px;background:#0d0f0f;border:2px solid #2a3a2a;box-shadow:0 0 40px rgba(245,166,35,.15),0 20px 60px rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;animation:splashPop .6s cubic-bezier(.34,1.56,.64,1) both}
@keyframes splashPop{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.splash-wordmark{margin-top:20px;font-size:22px;font-weight:900;color:#e8eaea;animation:sFade .5s .3s ease both}
.splash-sub{margin-top:6px;font-family:var(--mono);font-size:11px;color:#f5a623;letter-spacing:3px;text-transform:uppercase;animation:sFade .5s .45s ease both}
.splash-bar-wrap{margin-top:40px;width:120px;height:3px;background:#1e2424;border-radius:3px;overflow:hidden;animation:sFade .5s .5s ease both}
.splash-bar{height:100%;width:0;background:linear-gradient(90deg,#f5a623,#22c55e);border-radius:3px;animation:sLoad 1.2s .5s ease forwards}
@keyframes sFade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes sLoad{from{width:0}to{width:100%}}

/* LOGIN */
#screen-login{align-items:center;justify-content:center;padding:24px 20px;background:radial-gradient(ellipse at top,#1a2020,var(--bg) 70%)}
.login-logo{font-family:var(--mono);font-size:11px;letter-spacing:3px;color:var(--amber);text-transform:uppercase;margin-bottom:6px;text-align:center}
.login-title{font-size:28px;font-weight:900;color:var(--text);text-align:center;margin-bottom:4px}
.login-sub{font-family:var(--mono);font-size:11px;color:var(--muted);text-align:center;margin-bottom:32px;letter-spacing:1px}
.login-box{width:100%;max-width:360px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px 24px;text-align:center}
.login-icon{font-size:52px;margin-bottom:12px}
.login-heading{font-size:20px;font-weight:900;color:var(--text);margin-bottom:8px}
.login-desc{font-size:13px;color:var(--muted);margin-bottom:28px;line-height:1.7;font-family:var(--mono)}
.google-btn{display:flex;align-items:center;justify-content:center;gap:14px;width:100%;padding:16px 20px;background:#fff;border:none;border-radius:12px;cursor:pointer;transition:all .15s;font-family:'Barlow',sans-serif;font-size:17px;font-weight:700;color:#1f1f1f;box-shadow:0 2px 12px rgba(0,0,0,.4)}
.google-btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,0,0,.5)}
.google-btn:active{transform:scale(.97)}
.login-note{margin-top:20px;font-family:var(--mono);font-size:10px;color:var(--muted);line-height:1.8}
.login-loading{display:none;flex-direction:column;align-items:center;gap:14px;padding:20px 0}
.login-loading.show{display:flex}
.spin{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--amber);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* APP HEADER */
#screen-app{background:var(--bg)}
.app-header{background:var(--surface);border-bottom:2px solid var(--amber);padding:10px 12px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.app-header-left{display:flex;align-items:center;gap:10px}
.user-avatar{width:36px;height:36px;border-radius:50%;border:2px solid var(--amber);object-fit:cover;flex-shrink:0}
.user-avatar-ph{width:36px;height:36px;border-radius:50%;border:2px solid var(--amber);background:var(--panel);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:var(--amber);flex-shrink:0}
.app-user-info{display:flex;flex-direction:column;gap:1px}
.app-user-name{font-weight:700;font-size:14px;color:var(--text)}
.app-session-lbl{font-family:var(--mono);font-size:10px;color:var(--muted)}
.app-session-lbl span{color:var(--green)}
.app-header-right{display:flex;align-items:center;gap:7px}
.logout-btn{background:var(--panel);border:1px solid var(--border);color:var(--muted);font-size:11px;font-family:var(--mono);padding:6px 10px;border-radius:6px;cursor:pointer;white-space:nowrap}
.logout-btn:active{border-color:var(--red);color:var(--red)}
.end-session-btn{background:linear-gradient(135deg,#1a3a1a,#0c2010);border:1px solid #2a5a2a;color:#22c55e;font-family:'Barlow',sans-serif;font-size:11px;font-weight:700;padding:7px 11px;border-radius:7px;cursor:pointer;white-space:nowrap}
.end-session-btn:active{background:#22c55e;color:#000}

/* NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--surface);border-top:2px solid var(--border);display:flex;align-items:stretch;padding-bottom:env(safe-area-inset-bottom,0px)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:10px 4px 12px;background:none;border:none;color:var(--muted);font-family:var(--sans);font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;transition:color .15s}
.nav-btn .nav-icon{font-size:20px;line-height:1}
.nav-btn.active{color:var(--amber)}
.nav-btn.active .nav-icon{filter:drop-shadow(0 0 6px var(--amber))}
.nav-btn.drive-btn{color:var(--green);font-weight:700}

/* PAGES */
.page{display:none;padding:14px 12px;max-width:600px;margin:0 auto;padding-bottom:calc(80px + env(safe-area-inset-bottom,0px))}
.page.active{display:block}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:14px;overflow:hidden}
.card-header{background:var(--panel);padding:10px 14px;font-size:11px;font-family:var(--mono);letter-spacing:2px;color:var(--amber);text-transform:uppercase;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--amber);animation:pulse 2s infinite;flex-shrink:0}
.dot.green{background:var(--green)}.dot.off{background:var(--muted);animation:none}.dot.red{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.card-body{padding:14px}

/* BUTTONS */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:15px 12px;border:none;border-radius:var(--r);font-family:var(--sans);font-size:17px;font-weight:700;cursor:pointer;transition:all .12s;-webkit-appearance:none}
.btn:active{transform:scale(.97)}
.btn-amber{background:var(--amber);color:#000}.btn-green{background:var(--green);color:#000}
.btn-red{background:var(--red);color:#fff}
.btn-ghost{background:transparent;color:var(--text);border:1px solid var(--border);font-size:15px;padding:12px}
.btn-ghost:hover{border-color:var(--amber);color:var(--amber)}
.btn-sm{width:auto;padding:9px 14px;font-size:13px;font-weight:600}
.btn:disabled{opacity:.4;pointer-events:none}
.btn-row{display:flex;gap:10px;margin-top:10px}
.btn-row .btn{flex:1}
.btn-drive{background:linear-gradient(135deg,#1a6a3a,#0a4020);color:#22c55e;border:1px solid #2a8a4a;font-size:16px}
.btn-drive:hover,.btn-drive:active{background:#22c55e;color:#000}
.btn-drive:disabled{opacity:.4;pointer-events:none}

/* FORM */
label{display:block;font-size:11px;font-family:var(--mono);letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-bottom:6px}
input[type="text"],input[type="number"]{width:100%;background:var(--panel);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--sans);font-size:18px;font-weight:600;padding:13px 14px;outline:none;transition:border-color .15s;-webkit-appearance:none}
input:focus{border-color:var(--amber)}
input.highlight{border-color:var(--green);background:#0c1f14}
textarea{width:100%;background:var(--panel);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--sans);font-size:15px;font-weight:500;padding:11px 14px;outline:none;transition:border-color .15s;resize:none;line-height:1.4;min-height:64px}
textarea:focus{border-color:var(--amber)}
.field-group{margin-bottom:12px}
.mt-10{margin-top:10px}
.divider{height:1px;background:var(--border);margin:12px 0}
.section-title{font-family:var(--mono);font-size:11px;letter-spacing:2px;color:var(--amber);text-transform:uppercase;margin:16px 0 10px}
.hidden{display:none!important}

/* SCAN */
.mode-tabs{display:flex;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:14px}
.mode-tab{flex:1;padding:12px 8px;background:var(--panel);color:var(--muted);font-family:var(--sans);font-weight:700;font-size:14px;border:none;cursor:pointer;transition:all .15s;text-align:center}
.mode-tab.active{background:var(--amber);color:#000}
#live-wrap{position:relative;width:100%;background:#000;border-radius:var(--r);overflow:hidden;height:0;transition:height .3s}
#live-wrap.open{height:280px}
#live-video{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .4s}
#live-video.visible{opacity:1}
.scan-overlay{position:absolute;inset:0;pointer-events:none;z-index:10}
.scan-overlay::before,.scan-overlay::after,.scan-overlay .bl,.scan-overlay .br{content:'';position:absolute;width:30px;height:30px;border-color:var(--amber);border-style:solid}
.scan-overlay::before{top:20px;left:20px;border-width:3px 0 0 3px}
.scan-overlay::after{top:20px;right:20px;border-width:3px 3px 0 0}
.scan-overlay .bl{bottom:20px;left:20px;border-width:0 0 3px 3px}
.scan-overlay .br{bottom:20px;right:20px;border-width:0 3px 3px 0}
.scan-beam{position:absolute;left:20px;right:20px;height:2px;background:linear-gradient(90deg,transparent,var(--amber),transparent);box-shadow:0 0 8px var(--amber);animation:beam 1.8s ease-in-out infinite}
@keyframes beam{0%,100%{top:18%}50%{top:82%}}
#live-wrap.scan-flash{animation:flashG .35s ease}
@keyframes flashG{0%{box-shadow:inset 0 0 0 5px var(--green)}100%{box-shadow:none}}
.photo-btn-wrap{position:relative;overflow:hidden}
.photo-btn-wrap input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer;font-size:100px;z-index:2}
.photo-btn-visual{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:20px 12px;background:var(--amber);color:#000;border-radius:var(--r);font-family:var(--sans);font-size:20px;font-weight:900;pointer-events:none}
.photo-btn-wrap:active .photo-btn-visual{background:#d48e1a;transform:scale(.98)}
#preview-wrap{display:none;margin-top:12px;border-radius:var(--r);overflow:hidden;position:relative;background:#000}
#preview-wrap.show{display:block}
#preview-img{width:100%;max-height:160px;object-fit:cover;display:block;opacity:.75}
#preview-label{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.72);font-family:var(--mono);font-size:11px;color:var(--amber);padding:6px 10px;text-align:center}
.scan-status{font-family:var(--mono);font-size:12px;padding:9px 12px;border-radius:6px;margin-top:10px;text-align:center}
.ss-ready{background:var(--panel);color:var(--muted);border:1px solid var(--border)}
.ss-live{background:#0c1f14;color:var(--green);border:1px solid #1a4a28}
.ss-reading{background:#0a1a2a;color:var(--blue);border:1px solid #1a3a5a}
.ss-success{background:#0c1f14;color:var(--green);border:1px solid #1a4a28}
.ss-warn{background:#2a1e00;color:var(--amber);border:1px solid #4a3800}
.ss-error{background:#2a0f0f;color:var(--red);border:1px solid #4a1f1f}

/* QTY SHORTCUTS */
.qty-shortcuts{display:flex;gap:6px;margin-top:6px}
.qty-btn{flex:1;padding:10px 6px;background:var(--panel);border:1px solid var(--border);border-radius:8px;color:var(--blue);font-family:'Barlow',sans-serif;font-weight:800;font-size:15px;cursor:pointer;text-align:center;transition:all .1s}
.qty-btn:active{background:var(--blue);color:#000;transform:scale(.95)}

/* LAST SCAN BANNER */
#last-scan-banner{display:none;background:linear-gradient(135deg,#0c1f14,#0e2218);border:1px solid #1a4a28;border-radius:var(--r);padding:12px 16px;margin-bottom:14px;align-items:center;gap:12px;animation:bannerIn .3s ease}
#last-scan-banner.show{display:flex}
@keyframes bannerIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.banner-check{font-size:26px;flex-shrink:0}
.banner-sku{font-family:var(--mono);font-size:18px;font-weight:700;color:#22c55e;letter-spacing:2px}
.banner-label{font-size:11px;color:var(--muted);font-family:var(--mono);letter-spacing:1px;text-transform:uppercase}

/* SAVE FLASH */
#save-flash{position:fixed;inset:0;z-index:8000;pointer-events:none;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .1s}
#save-flash.show{opacity:1}
.save-flash-inner{background:rgba(34,197,94,.15);border:2px solid #22c55e;border-radius:20px;padding:24px 40px;display:flex;flex-direction:column;align-items:center;gap:8px;backdrop-filter:blur(4px);animation:flashPop .4s cubic-bezier(.34,1.56,.64,1)}
.save-flash-check{font-size:52px;line-height:1}
.save-flash-label{font-family:'Barlow',sans-serif;font-weight:900;font-size:18px;color:#22c55e}
@keyframes flashPop{from{transform:scale(.6)}to{transform:scale(1)}}

/* TOAST */
#toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-20px);background:var(--green);color:#000;font-family:var(--sans);font-weight:700;font-size:15px;padding:12px 24px;border-radius:30px;z-index:9999;opacity:0;transition:all .25s;white-space:nowrap;pointer-events:none;max-width:90vw;text-align:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.error{background:var(--red);color:#fff}
#toast.warn{background:var(--amber);color:#000}

/* TABLE */
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:400px}
thead tr{background:var(--panel);font-family:var(--mono);font-size:10px;letter-spacing:1.5px;color:var(--amber);text-transform:uppercase}
th,td{padding:10px 8px;text-align:left;border-bottom:1px solid var(--border)}
td:last-child{text-align:center}
tbody tr:last-child td{border-bottom:none}
tbody tr.new-row{animation:rowFlash .7s ease}
@keyframes rowFlash{0%{background:#1a3a1a}100%{background:transparent}}
.sku-cell{font-family:var(--mono);color:var(--amber);font-size:12px}
.price-cell{color:var(--green);font-weight:600}
.qty-cell{font-weight:700;color:var(--blue)}
.note-cell{font-size:11px;color:var(--muted);max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.del-btn{background:none;border:1px solid #3a2020;color:var(--red);border-radius:6px;padding:5px 8px;font-size:13px;cursor:pointer}
.empty-state{text-align:center;padding:28px 20px;color:var(--muted);font-size:13px;font-family:var(--mono)}
.tbl-footer{font-family:var(--mono);font-size:12px;color:var(--muted);text-align:right;padding:6px 12px;border-top:1px solid var(--border)}
.tbl-footer span{color:var(--amber);font-weight:700}

/* DASHBOARD */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.stat-val{font-size:28px;font-weight:900;color:var(--amber);line-height:1}
.stat-lbl{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:4px}
.stat-card.green .stat-val{color:var(--green)}.stat-card.blue .stat-val{color:var(--blue)}.stat-card.purple .stat-val{color:var(--purple)}
.session-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.session-head{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.session-head:hover{background:var(--panel)}
.session-title{font-weight:700;font-size:15px;color:var(--text)}
.session-meta{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:3px}
.session-badge{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-family:var(--mono);font-size:11px;color:var(--amber);white-space:nowrap}
.session-body{display:none;border-top:1px solid var(--border)}.session-body.open{display:block}
.session-actions{display:flex;gap:8px;padding:10px 12px;background:var(--panel);border-bottom:1px solid var(--border)}
.session-actions .btn{flex:1;padding:9px 10px;font-size:13px}

/* SETTINGS */
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--border);font-size:14px}
.settings-row:last-child{border-bottom:none}
.settings-label{color:var(--text);font-weight:600}
.settings-desc{color:var(--muted);font-size:12px;margin-top:2px}
.toggle-wrap{position:relative;width:52px;height:28px;flex-shrink:0}
.toggle-wrap input[type="checkbox"]{opacity:0;width:0;height:0;position:absolute}
.toggle-track{position:absolute;inset:0;ba
